services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: inkvault
      POSTGRES_USER: inkvault
      POSTGRES_PASSWORD: inkvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,dynamodb

volumes:
  pgdata:
